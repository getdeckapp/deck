name: release

on:
  push:
    branches:
      - main
    paths:
      - CHANGELOG.md

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version and release notes from CHANGELOG
        id: changelog
        run: |
          VERSION=$(grep -m1 -E '^## [0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | sed -E 's/^## ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')

          if [ -z "$VERSION" ]; then
            echo "No version heading found in CHANGELOG.md"
            exit 1
          fi

          TAG="v${VERSION}"
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"

          awk -v version="$VERSION" '
            $0 ~ "^## " version { capture = 1; next }
            capture && /^## [0-9]/ { exit }
            capture { print }
          ' CHANGELOG.md > "$NOTES_FILE"

          if [ ! -s "$NOTES_FILE" ]; then
            echo "No release notes found for version ${VERSION}"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.changelog.outputs.tag }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.changelog.outputs.tag }} already exists."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.exists.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          draft: false
          prerelease: false
          generate_release_notes: false
