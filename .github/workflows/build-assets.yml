name: build-assets

on:
  push:
    paths:
      - 'resources/css/**'
      - 'resources/views/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - '.github/actions/build-assets/**'
      - '.github/workflows/build-assets.yml'
  pull_request:
    paths:
      - 'resources/css/**'
      - 'resources/views/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - '.github/actions/build-assets/**'
      - '.github/workflows/build-assets.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build assets
        uses: ./.github/actions/build-assets

      - name: Verify committed assets are up to date
        run: git diff --exit-code resources/dist/
